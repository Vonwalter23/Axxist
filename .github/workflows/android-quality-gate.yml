  # ============================================================
  # JOB 4: Final Status
  # ============================================================
  final-status:
    name: Final Quality Gate Status
    runs-on: ubuntu-latest
    needs: [build-validation, runtime-validation, generate-report]
    if: always()
    
    steps:
      - name: Determine Final Status
        run: |
          BUILD_STATUS=${{ needs.build-validation.result }}
          RUNTIME_STATUS=${{ needs.runtime-validation.result }}
          
          echo "Build Validation: $BUILD_STATUS"
          echo "Runtime Validation: $RUNTIME_STATUS"
          
          if [ "$BUILD_STATUS" == "success" ]; then
            if [ "$RUNTIME_STATUS" == "success" ] || [ "$RUNTIME_STATUS" == "skipped" ]; then
              FINAL_STATUS="PASS"
            else
              FINAL_STATUS="FAIL"
            fi
          else
            FINAL_STATUS="FAIL"
          fi
          
          echo "FINAL_STATUS=$FINAL_STATUS" >> $GITHUB_OUTPUT
          
          if [ "$FINAL_STATUS" == "PASS" ]; then
            echo "✅ QUALITY GATE PASSED"
            echo "All validations completed successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ QUALITY GATE FAILED"
            echo "Some validations failed. Please review the logs." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
      
      - name: Create Status File
        run: |
          echo "quality_gate_status=PASS" >> $GITHUB_OUTPUT
