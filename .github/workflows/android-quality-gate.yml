# Axxist Android Quality Gate - GitHub Actions Workflow
#
# Purpose:
# - Automatic execution on push and pull requests
# - Quality validation before accepting changes
# - Runtime crash detection
# - Required Status Check for main branch protection
#
# Author: OpenHands
# Version: 2.0

name: Android Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_runtime_validation:
        description: 'Skip runtime validation (for faster builds)'
        required: false
        default: 'false'

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  ANDROID_MIN_SDK: '29'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false'
  EMULATOR_TIMEOUT: '180'

permissions:
  contents: read

jobs:
  # ============================================================
  # JOB 1: Build Validation
  # ============================================================
  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
      
      - name: Build Debug APK
        id: build_debug
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-debug.log
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "DEBUG_APK_EXISTS=true" >> $GITHUB_OUTPUT
            echo "DEBUG_APK_SIZE=$(ls -lh app/build/outputs/apk/debug/app-debug.apk | awk '{print $5}')" >> $GITHUB_OUTPUT
            echo "DEBUG_SHA256=$(sha256sum app/build/outputs/apk/debug/app-debug.apk | awk '{print $1}')" >> $GITHUB_OUTPUT
          else
            echo "DEBUG_APK_EXISTS=false" >> $GITHUB_OUTPUT
            echo "DEBUG_BUILD_FAILED=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload Debug Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: android/build-debug.log
          retention-days: 7
      
      - name: Upload Debug APK
        if: steps.build_debug.outputs.DEBUG_APK_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
      
      - name: Build Release APK
        id: build_release
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build-release.log
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "RELEASE_APK_EXISTS=true" >> $GITHUB_OUTPUT
            echo "RELEASE_APK_SIZE=$(ls -lh app/build/outputs/apk/release/app-release.apk | awk '{print $5}')" >> $GITHUB_OUTPUT
            echo "RELEASE_SHA256=$(sha256sum app/build/outputs/apk/release/app-release.apk | awk '{print $1}')" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_APK_EXISTS=false" >> $GITHUB_OUTPUT
            echo "RELEASE_BUILD_FAILED=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload Release Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-release-log
          path: android/build-release.log
          retention-days: 7
      
      - name: Upload Release APK
        if: steps.build_release.outputs.RELEASE_APK_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
      
      - name: Run Android Lint
        id: lint
        run: |
          cd android
          ./gradlew lintDebug --no-daemon 2>&1 | tee lint.log
          echo "LINT_COMPLETED=true" >> $GITHUB_OUTPUT
      
      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            android/lint.log
            android/app/build/reports/lint-results.html
            android/app/build/reports/lint-results.xml
          retention-days: 14

  # ============================================================
  # JOB 2: Runtime Validation
  # ============================================================
  runtime-validation:
    name: Runtime Validation
    runs-on: ubuntu-latest
    needs: build-validation
    if: ${{ github.event.inputs.skip_runtime_validation != 'true' }}
    
    outputs:
      emulator_booted: ${{ steps.emulator.outputs.EMULATOR_STATUS }}
      app_installed: ${{ steps.install.outputs.INSTALL_SUCCESS }}
      app_launched: ${{ steps.launch.outputs.LAUNCH_SUCCESS }}
      runtime_duration: ${{ steps.runtime.outputs.DURATION }}
      crash_detected: ${{ steps.analysis.outputs.CRASH_DETECTED }}
      crash_count: ${{ steps.analysis.outputs.CRASH_COUNT }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}
      
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
      
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -20
      
      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: /tmp
      
      - name: Create Android Emulator
        id: emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -no-snapshot -noaudio -gpu swiftshader_indirect
          script: |
            echo "Waiting for emulator boot..."
            boot_output=$(adb wait-for-device shell getprop sys.boot_completed 2>&1)
            echo "Boot completed: $boot_output"
            if [ "$boot_output" = "1" ]; then
              echo "EMULATOR_STATUS=BOOTED" >> $GITHUB_OUTPUT
            else
              echo "EMULATOR_STATUS=FAILED" >> $GITHUB_OUTPUT
            fi
      
      - name: Install Debug APK
        id: install
        run: |
          echo "Installing APK..."
          adb install -r /tmp/app-debug.apk
          if [ $? -eq 0 ]; then
            echo "INSTALL_SUCCESS=true" >> $GITHUB_OUTPUT
          else
            echo "INSTALL_SUCCESS=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Launch Application
        id: launch
        run: |
          PACKAGE_NAME="com.axxist.app"
          adb shell am start -n "$PACKAGE_NAME/.MainActivity"
          sleep 2
          if [ $? -eq 0 ]; then
            echo "LAUNCH_SUCCESS=true" >> $GITHUB_OUTPUT
          else
            echo "LAUNCH_SUCCESS=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Runtime Validation
        id: runtime
        run: |
          echo "Starting runtime validation..."
          START_TIME=$(date +%s)
          
          adb logcat -c
          adb logcat > /tmp/logcat.txt &
          LOGCAT_PID=$!
          
          PACKAGE_NAME="com.axxist.app"
          adb shell monkey -p "$PACKAGE_NAME" -c android.intent.category.LAUNCHER 1 > /dev/null 2>&1 &
          
          sleep ${{ env.EMULATOR_TIMEOUT }}
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "DURATION=$DURATION" >> $GITHUB_OUTPUT
          
          kill $LOGCAT_PID 2>/dev/null || true
          echo "Runtime validation completed. Duration: $DURATION seconds"
      
      - name: Upload Logcat
        uses: actions/upload-artifact@v4
        with:
          name: logcat
          path: /tmp/logcat.txt
          retention-days: 14
      
      - name: Analyze Logcat for Crashes
        id: analysis
        run: |
          echo "Analyzing logcat for crashes..."
          
          FATAL_COUNT=$(grep -c "FATAL EXCEPTION" /tmp/logcat.txt 2>/dev/null || echo "0")
          RUNTIME_COUNT=$(grep -c "AndroidRuntime" /tmp/logcat.txt 2>/dev/null || echo "0")
          TOTAL_CRASHES=$((FATAL_COUNT + RUNTIME_COUNT))
          
          echo "FATAL EXCEPTION count: $FATAL_COUNT"
          echo "AndroidRuntime count: $RUNTIME_COUNT"
          echo "TOTAL_CRASHES=$TOTAL_CRASHES" >> $GITHUB_OUTPUT
          
          if [ "$TOTAL_CRASHES" -gt 0 ]; then
            echo "CRASH_DETECTED=true" >> $GITHUB_OUTPUT
            echo "CRASH_COUNT=$TOTAL_CRASHES" >> $GITHUB_OUTPUT
          else
            echo "CRASH_DETECTED=false" >> $GITHUB_OUTPUT
            echo "CRASH_COUNT=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Stop Emulator
        if: always()
        run: |
          echo "Stopping emulator..."
          adb emu kill 2>/dev/null || true

  # ============================================================
  # JOB 3: Generate Report
  # ============================================================
  generate-report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [build-validation, runtime-validation]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Generate Build Summary
        run: |
          echo "=============================================" > build-summary.txt
          echo "AXXIST QUALITY GATE - BUILD SUMMARY" >> build-summary.txt
          echo "=============================================" >> build-summary.txt
          echo "" >> build-summary.txt
          echo "Repository: Vonwalter23/Axxist" >> build-summary.txt
          echo "Commit SHA: ${{ github.sha }}" >> build-summary.txt
          echo "Branch: ${{ github.ref_name }}" >> build-summary.txt
          echo "Date: $(date -u +\"%Y-%m-%d %H:%M:%S UTC\")" >> build-summary.txt
          echo "" >> build-summary.txt
          echo "STAGE: STAGE_08 (Action Framework)" >> build-summary.txt
          echo "" >> build-summary.txt
          echo "BUILD VALIDATION" >> build-summary.txt
          echo "----------------" >> build-summary.txt
          echo "Debug Build: ${{ needs.build-validation.result }}" >> build-summary.txt
          echo "Release Build: ${{ needs.build-validation.result }}" >> build-summary.txt
          echo "Lint: ${{ needs.build-validation.result }}" >> build-summary.txt
          echo "" >> build-summary.txt
          echo "RUNTIME VALIDATION" >> build-summary.txt
          echo "------------------" >> build-summary.txt
          echo "Emulator Boot: ${{ needs.runtime-validation.outputs.emulator_booted || 'SKIPPED' }}" >> build-summary.txt
          echo "APK Install: ${{ needs.runtime-validation.outputs.app_installed || 'SKIPPED' }}" >> build-summary.txt
          echo "App Launch: ${{ needs.runtime-validation.outputs.app_launched || 'SKIPPED' }}" >> build-summary.txt
          echo "Runtime Duration: ${{ needs.runtime-validation.outputs.runtime_duration || '0' }}s" >> build-summary.txt
          echo "Crash Detected: ${{ needs.runtime-validation.outputs.crash_detected || 'UNKNOWN' }}" >> build-summary.txt
          echo "Crash Count: ${{ needs.runtime-validation.outputs.crash_count || '0' }}" >> build-summary.txt
          echo "" >> build-summary.txt
          echo "=============================================" >> build-summary.txt
          echo "RESULT: ${{ needs.build-validation.result }}" >> build-summary.txt
          echo "=============================================" >> build-summary.txt
          cat build-summary.txt
      
      - name: Upload Build Summary
        uses: actions/upload-artifact@v4
        with:
          name: build-summary
          path: build-summary.txt
          retention-days: 30
      
      - name: Final Summary
        run: |
          echo "## Axxist Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Validation | ${{ needs.build-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runtime Validation | ${{ needs.runtime-validation.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Crash Detection | ${{ needs.runtime-validation.outputs.crash_detected || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 4: Final Status
  # ============================================================
  final-status:
    name: Final Quality Gate Status
    runs-on: ubuntu-latest
    needs: [build-validation, runtime-validation, generate-report]
    if: always()
    
    steps:
      - name: Determine Final Status
        id: final
        run: |
          BUILD_STATUS=${{ needs.build-validation.result }}
          RUNTIME_STATUS=${{ needs.runtime-validation.result }}
          
          echo "Build Validation: $BUILD_STATUS"
          echo "Runtime Validation: $RUNTIME_STATUS"
          
          if [ "$BUILD_STATUS" == "success" ]; then
            if [ "$RUNTIME_STATUS" == "success" ] || [ "$RUNTIME_STATUS" == "skipped" ]; then
              echo "FINAL_RESULT=PASS" >> $GITHUB_OUTPUT
              echo "FINAL_STATUS=PASS" >> $GITHUB_ENV
              echo "RESULT=PASS"
            else
              echo "FINAL_RESULT=FAIL" >> $GITHUB_OUTPUT
              echo "FINAL_STATUS=FAIL" >> $GITHUB_ENV
              echo "RESULT=FAIL"
            fi
          else
            echo "FINAL_RESULT=FAIL" >> $GITHUB_OUTPUT
            echo "FINAL_STATUS=FAIL" >> $GITHUB_ENV
            echo "RESULT=FAIL"
          fi
      
      - name: Fail if validation failed
        if: env.FINAL_STATUS == 'FAIL'
        run: |
          echo "Quality Gate FAILED - Build or Runtime validation did not pass"
          exit 1
