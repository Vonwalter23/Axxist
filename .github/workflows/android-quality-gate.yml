# Axxist Android Quality Gate - GitHub Actions Workflow
#
# This workflow implements the Axxist Quality Gate Policy for automatic
# validation of Android builds and runtime behavior.
#
# Purpose:
# - Automatic execution on push and pull requests
# - Quality validation before accepting changes
# - Runtime crash detection
# - Required Status Check for main branch protection
#
# Author: OpenHands
# Version: 1.0

name: Android Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_runtime_validation:
        description: 'Skip runtime validation (for faster builds)'
        required: false
        default: 'false'

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  ANDROID_MIN_SDK: '29'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false'
  EMULATOR_TIMEOUT: '180'

permissions:
  contents: read
  actions: read

jobs:
  # ============================================================
  # JOB 1: Build Validation
  # ============================================================
  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
      
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Cache Android dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/build-cache
            ~/Library//Android/sdk
          key: ${{ runner.os }}-android-${{ hashFiles('**/build.gradle', '**/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-android-
      
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
      
      # ============================================================
      # Build Debug APK
      # ============================================================
      - name: Build Debug APK
        id: build_debug
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-debug.log
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "DEBUG_APK_EXISTS=true" >> $GITHUB_OUTPUT
            echo "DEBUG_APK_SIZE=$(ls -lh app/build/outputs/apk/debug/app-debug.apk | awk '{print $5}')" >> $GITHUB_OUTPUT
            echo "DEBUG_APK_PATH=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
            echo "DEBUG_SHA256=$(sha256sum app/build/outputs/apk/debug/app-debug.apk | awk '{print $1}')" >> $GITHUB_OUTPUT
          else
            echo "DEBUG_APK_EXISTS=false" >> $GITHUB_OUTPUT
            echo "DEBUG_BUILD_FAILED=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload Debug Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: android/build-debug.log
          retention-days: 7
      
      - name: Upload Debug APK
        if: steps.build_debug.outputs.DEBUG_APK_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
      
      # ============================================================
      # Build Release APK
      # ============================================================
      - name: Build Release APK
        id: build_release
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build-release.log
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "RELEASE_APK_EXISTS=true" >> $GITHUB_OUTPUT
            echo "RELEASE_APK_SIZE=$(ls -lh app/build/outputs/apk/release/app-release.apk | awk '{print $5}')" >> $GITHUB_OUTPUT
            echo "RELEASE_APK_PATH=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "RELEASE_SHA256=$(sha256sum app/build/outputs/apk/release/app-release.apk | awk '{print $1}')" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_APK_EXISTS=false" >> $GITHUB_OUTPUT
            echo "RELEASE_BUILD_FAILED=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload Release Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-release-log
          path: android/build-release.log
          retention-days: 7
      
      - name: Upload Release APK
        if: steps.build_release.outputs.RELEASE_APK_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
      
      # ============================================================
      # Android Lint
      # ============================================================
      - name: Run Android Lint
        id: lint
        run: |
          cd android
          ./gradlew lintDebug --no-daemon 2>&1 | tee lint.log
          if [ -f app/build/reports/lint-results.html ]; then
            echo "LINT_HTML_EXISTS=true" >> $GITHUB_OUTPUT
            echo "LINT_ERRORS=$(grep -c 'Error:' app/build/outputs/lint-results.html 2>/dev/null || echo '0')" >> $GITHUB_OUTPUT
            echo "LINT_WARNINGS=$(grep -c 'Warning:' app/build/outputs/lint-results.html 2>/dev/null || echo '0')" >> $GITHUB_OUTPUT
          else
            echo "LINT_HTML_EXISTS=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            android/lint.log
            android/app/build/reports/lint-results.html
            android/app/build/reports/lint-results.xml
          retention-days: 14
      
      # ============================================================
      # Summary
      # ============================================================
      - name: Build Summary
        run: |
          echo "## Build Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | Status | APK Size | SHA256 |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Debug | ${{ steps.build_debug.outputs.DEBUG_APK_EXISTS || 'N/A' }} | ${{ steps.build_debug.outputs.DEBUG_APK_SIZE || 'N/A' }} | \`${{ steps.build_debug.outputs.DEBUG_SHA256 || 'N/A' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | ${{ steps.build_release.outputs.RELEASE_APK_EXISTS || 'N/A' }} | ${{ steps.build_release.outputs.RELEASE_APK_SIZE || 'N/A' }} | \`${{ steps.build_release.outputs.RELEASE_SHA256 || 'N/A' }}\` |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 2: Runtime Validation (Optional - requires emulator)
  # ============================================================
  runtime-validation:
    name: Runtime Validation
    runs-on: ubuntu-latest
    needs: build-validation
    if: ${{ github.event.inputs.skip_runtime_validation != 'true' && needs.build-validation.outputs.DEBUG_APK_EXISTS != 'false' }}
    
    outputs:
      emulator_booted: ${{ steps.emulator.outputs.EMULATOR_STATUS }}
      app_installed: ${{ steps.install.outputs.INSTALL_SUCCESS }}
      app_launched: ${{ steps.launch.outputs.LAUNCH_SUCCESS }}
      runtime_duration: ${{ steps.runtime.outputs.DURATION }}
      crash_detected: ${{ steps.analysis.outputs.CRASH_DETECTED }}
      crash_count: ${{ steps.analysis.outputs.CRASH_COUNT }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}
      
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
      
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -20
      
      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: /tmp
      
      # ============================================================
      # Create and Start Emulator
      # ============================================================
      - name: Create Android Emulator
        id: emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -no-snapshot -noaudio -gpu swiftshader_indirect
          script: |
            echo "Waiting for emulator boot..."
            boot_output=$(adb wait-for-device shell getprop sys.boot_completed 2>&1)
            echo "Boot completed: $boot_output"
            if [ "$boot_output" = "1" ]; then
              echo "EMULATOR_STATUS=BOOTED" >> $GITHUB_OUTPUT
              echo "Emulator booted successfully"
              adb shell settings put global window_animation_scale 0
              adb shell settings put global transition_animation_scale 0
            else
              echo "EMULATOR_STATUS=FAILED" >> $GITHUB_OUTPUT
              echo "Emulator boot failed or timed out"
            fi
      
      # ============================================================
      # Install APK
      # ============================================================
      - name: Install Debug APK
        id: install
        run: |
          echo "Installing APK..."
          adb install -r /tmp/app-debug.apk
          if [ $? -eq 0 ]; then
            echo "INSTALL_SUCCESS=true" >> $GITHUB_OUTPUT
            echo "APK installed successfully"
          else
            echo "INSTALL_SUCCESS=false" >> $GITHUB_OUTPUT
            echo "APK installation failed"
            exit 1
          fi
      
      # ============================================================
      # Launch Application with Monkey
      # ============================================================
      - name: Launch Application
        id: launch
        run: |
          echo "Launching application with monkey..."
          PACKAGE_NAME="com.axxist.app"
          adb shell am start -n "$PACKAGE_NAME/.MainActivity"
          sleep 2
          if [ $? -eq 0 ]; then
            echo "LAUNCH_SUCCESS=true" >> $GITHUB_OUTPUT
            echo "Application launched"
          else
            echo "LAUNCH_SUCCESS=false" >> $GITHUB_OUTPUT
            echo "Application launch failed"
          fi
      
      # ============================================================
      # Runtime Validation - Keep app running and capture logcat
      # ============================================================
      - name: Runtime Validation
        id: runtime
        run: |
          echo "Starting runtime validation..."
          echo "Keeping application running for ${{ env.EMULATOR_TIMEOUT }} seconds..."
          
          START_TIME=$(date +%s)
          
          # Start logcat capture in background
          adb logcat -c  # Clear previous logs
          adb logcat > /tmp/logcat.txt &
          LOGCAT_PID=$!
          
          # Keep app running with monkey (throttled)
          PACKAGE_NAME="com.axxist.app"
          adb shell monkey -p "$PACKAGE_NAME" -c android.intent.category.LAUNCHER 1 > /dev/null 2>&1 &
          MONKEY_PID=$!
          
          # Wait for specified duration
          sleep ${{ env.EMULATOR_TIMEOUT }}
          
          # Calculate duration
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "DURATION=$DURATION" >> $GITHUB_OUTPUT
          
          # Kill processes
          kill $LOGCAT_PID 2>/dev/null || true
          kill $MONKEY_PID 2>/dev/null || true
          
          echo "Runtime validation completed. Duration: $DURATION seconds"
      
      - name: Upload Logcat
        uses: actions/upload-artifact@v4
        with:
          name: logcat
          path: /tmp/logcat.txt
          retention-days: 14
      
      # ============================================================
      # Crash Analysis
      # ============================================================
      - name: Analyze Logcat for Crashes
        id: analysis
        run: |
          echo "Analyzing logcat for crashes..."
          
          # Search for crash indicators
          FATAL_COUNT=$(grep -c "FATAL EXCEPTION" /tmp/logcat.txt 2>/dev/null || echo "0")
          RUNTIME_COUNT=$(grep -c "AndroidRuntime" /tmp/logcat.txt 2>/dev/null || echo "0")
          PROCESS_COUNT=$(grep -c "Process:" /tmp/logcat.txt 2>/dev/null || echo "0")
          CAUSED_COUNT=$(grep -c "Caused by:" /tmp/logcat.txt 2>/dev/null || echo "0")
          
          TOTAL_CRASHES=$((FATAL_COUNT + RUNTIME_COUNT))
          
          echo "FATAL EXCEPTION count: $FATAL_COUNT"
          echo "AndroidRuntime count: $RUNTIME_COUNT"
          echo "Process: count: $PROCESS_COUNT"
          echo "Caused by: count: $CAUSED_COUNT"
          echo "TOTAL_CRASHES=$TOTAL_CRASHES" >> $GITHUB_OUTPUT
          
          if [ "$TOTAL_CRASHES" -gt 0 ]; then
            echo "CRASH_DETECTED=true" >> $GITHUB_OUTPUT
            echo "CRASH_COUNT=$TOTAL_CRASHES" >> $GITHUB_OUTPUT
            echo "## ⚠️ CRASH DETECTED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found $TOTAL_CRASHES potential crash indicators" >> $GITHUB_STEP_SUMMARY
          else
            echo "CRASH_DETECTED=false" >> $GITHUB_OUTPUT
            echo "CRASH_COUNT=0" >> $GITHUB_OUTPUT
            echo "## ✅ Runtime Validation Passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No crashes detected during ${{ env.EMULATOR_TIMEOUT }} seconds of runtime" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Extract Crash Details
        if: steps.analysis.outputs.CRASH_DETECTED == 'true'
        run: |
          echo "## Crash Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          grep -A5 "FATAL EXCEPTION" /tmp/logcat.txt | head -50 >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
      
      - name: Stop Emulator
        if: always()
        run: |
          echo "Stopping emulator..."
          adb emu kill 2>/dev/null || true
      
      - name: Runtime Summary
        run: |
          echo "## Runtime Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Emulator Boot | ${{ needs.runtime-validation.outputs.emulator_booted || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Install | ${{ needs.runtime-validation.outputs.app_installed || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App Launch | ${{ needs.runtime-validation.outputs.app_launched || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runtime Duration | ${{ needs.runtime-validation.outputs.runtime_duration || 'N/A' }}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Crash Detected | ${{ needs.runtime-validation.outputs.crash_detected || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Crash Count | ${{ needs.runtime-validation.outputs.crash_count || '0' }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 3: Generate Report
  # ============================================================
  generate-report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [build-validation, runtime-validation]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Get Debug APK SHA256
        id: debug_sha
        run: |
          if [ -f artifacts/app-debug-apk/app-debug.apk ]; then
            echo "DEBUG_SHA=$(sha256sum artifacts/app-debug-apk/app-debug.apk | awk '{print $1}')" >> $GITHUB_OUTPUT
            echo "DEBUG_SIZE=$(ls -lh artifacts/app-debug-apk/app-debug.apk | awk '{print $5}')" >> $GITHUB_OUTPUT
          fi
      
      - name: Get Release APK SHA256
        id: release_sha
        run: |
          if [ -f artifacts/app-release-apk/app-release.apk ]; then
            echo "RELEASE_SHA=$(sha256sum artifacts/app-release-apk/app-release.apk | awk '{print $1}')" >> $GITHUB_OUTPUT
            echo "RELEASE_SIZE=$(ls -lh artifacts/app-release-apk/app-release.apk | awk '{print $5}')" >> $GITHUB_OUTPUT
          fi
      
      - name: Analyze Logcat
        id: logcat_analysis
        run: |
          if [ -f artifacts/logcat/logcat.txt ]; then
            FATAL=$(grep -c "FATAL EXCEPTION" artifacts/logcat/logcat.txt 2>/dev/null || echo "0")
            RUNTIME=$(grep -c "AndroidRuntime" artifacts/logcat/logcat.txt 2>/dev/null || echo "0")
            echo "CRASHES=$((FATAL + RUNTIME))" >> $GITHUB_OUTPUT
          else
            echo "CRASHES=0" >> $GITHUB_OUTPUT
            echo "LOGCAT_MISSING=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate HTML Report
        run: |
          cat > report.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axxist Quality Gate Report</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #1f6feb 0%, #238636 100%); padding: 30px; border-radius: 12px; margin-bottom: 30px; }
        .header h1 { color: white; font-size: 28px; margin-bottom: 10px; }
        .header p { color: rgba(255,255,255,0.8); font-size: 14px; }
        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-top: 15px; }
        .status-pass { background: #238636; color: white; }
        .status-fail { background: #da3633; color: white; }
        .status-warning { background: #d29922; color: black; }
        .status-pending { background: #6e7681; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
        .card h2 { color: #f0f6fc; font-size: 16px; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .metric { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #21262d; }
        .metric:last-child { border-bottom: none; }
        .metric-label { color: #8b949e; }
        .metric-value { color: #f0f6fc; font-weight: 500; font-family: monospace; }
        .metric-value.pass { color: #3fb950; }
        .metric-value.fail { color: #f85149; }
        .metric-value.warning { color: #d29922; }
        .section { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section h2 { color: #f0f6fc; font-size: 18px; margin-bottom: 15px; }
        .artifact-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .artifact { background: #21262d; padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        .artifact-icon { width: 24px; height: 24px; }
        .footer { text-align: center; padding: 20px; color: #8b949e; font-size: 12px; }
        .checks { display: flex; flex-direction: column; gap: 10px; }
        .check { display: flex; align-items: center; gap: 10px; padding: 10px; background: #21262d; border-radius: 8px; }
        .check-icon { width: 20px; height: 20px; }
        .check-pass { color: #3fb950; }
        .check-fail { color: #f85149; }
        .check-pending { color: #8b949e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Axxist Quality Gate Report</h1>
            <p>Automated Android Build and Runtime Validation</p>
            <div id="status-badge" class="status-badge status-pending">VALIDATING...</div>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>Repository Information</h2>
                <div class="metric">
                    <span class="metric-label">Repository</span>
                    <span class="metric-value">Vonwalter23/Axxist</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Commit SHA</span>
                    <span class="metric-value" id="commit-sha">$GITHUB_SHA</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Branch</span>
                    <span class="metric-value">$GITHUB_REF_NAME</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Date</span>
                    <span class="metric-value" id="date"></span>
                </div>
                <div class="metric">
                    <span class="metric-label">Stage</span>
                    <span class="metric-value">STAGE_08 (Action Framework)</span>
                </div>
            </div>
            
            <div class="card">
                <h2>Build Results</h2>
                <div class="metric">
                    <span class="metric-label">Build Debug</span>
                    <span class="metric-value pass" id="build-debug">✅ PASS</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Build Release</span>
                    <span class="metric-value pass" id="build-release">✅ PASS</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Android Lint</span>
                    <span class="metric-value pass" id="lint-result">✅ PASS</span>
                </div>
            </div>
            
            <div class="card">
                <h2>APK Information</h2>
                <div class="metric">
                    <span class="metric-label">Debug Size</span>
                    <span class="metric-value" id="debug-size">N/A</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Debug SHA256</span>
                    <span class="metric-value" id="debug-sha" style="font-size:10px;word-break:break-all;">N/A</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Release Size</span>
                    <span class="metric-value" id="release-size">N/A</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Release SHA256</span>
                    <span class="metric-value" id="release-sha" style="font-size:10px;word-break:break-all;">N/A</span>
                </div>
            </div>
            
            <div class="card">
                <h2>Runtime Validation</h2>
                <div class="metric">
                    <span class="metric-label">Emulator Boot</span>
                    <span class="metric-value pass" id="emulator-boot">✅ PASS</span>
                </div>
                <div class="metric">
                    <span class="metric-label">APK Install</span>
                    <span class="metric-value pass" id="install-success">✅ PASS</span>
                </div>
                <div class="metric">
                    <span class="metric-label">App Launch</span>
                    <span class="metric-value pass" id="launch-success">✅ PASS</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Runtime Duration</span>
                    <span class="metric-value" id="runtime-duration">180s</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Crash Detection</span>
                    <span class="metric-value pass" id="crash-detection">✅ PASS</span>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2>Validation Checks</h2>
            <div class="checks">
                <div class="check">
                    <span class="check-icon check-pass">✓</span>
                    <span>assembleDebug executed</span>
                </div>
                <div class="check">
                    <span class="check-icon check-pass">✓</span>
                    <span>assembleRelease executed</span>
                </div>
                <div class="check">
                    <span class="check-icon check-pass">✓</span>
                    <span>lintDebug executed</span>
