# Axxist Android Quality Gate - GitHub Actions Workflow
#
# Purpose:
# - Automatic execution on push and pull requests
# - Quality validation before accepting changes
# - APK generation and certification
# - Required Status Check for main branch protection
#
# Author: OpenHands
# Version: 4.0

name: Android Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to execute'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - debug
          - release

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  ANDROID_MIN_SDK: '29'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false'

permissions:
  contents: read

jobs:
  # ============================================================
  # JOB 1: Build Validation
  # ============================================================
  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    
    outputs:
      debug_apk_exists: ${{ steps.build_debug.outputs.DEBUG_APK_EXISTS }}
      debug_apk_size: ${{ steps.build_debug.outputs.DEBUG_APK_SIZE }}
      debug_sha256: ${{ steps.build_debug.outputs.DEBUG_SHA256 }}
      release_apk_exists: ${{ steps.build_release.outputs.RELEASE_APK_EXISTS }}
      release_apk_size: ${{ steps.build_release.outputs.RELEASE_APK_SIZE }}
      release_sha256: ${{ steps.build_release.outputs.RELEASE_SHA256 }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true
      
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
      
      # ============================================================
      # Build Debug APK
      # ============================================================
      - name: Build Debug APK
        id: build_debug
        if: ${{ github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-debug.log
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "DEBUG_APK_EXISTS=true" >> $GITHUB_OUTPUT
            echo "DEBUG_APK_SIZE=$(ls -lh app/build/outputs/apk/debug/app-debug.apk | awk '{print $5}')" >> $GITHUB_OUTPUT
            echo "DEBUG_SHA256=$(sha256sum app/build/outputs/apk/debug/app-debug.apk | awk '{print $1}')" >> $GITHUB_OUTPUT
            echo "DEBUG_APK_ABSOLUTE=$(realpath app/build/outputs/apk/debug/app-debug.apk)" >> $GITHUB_OUTPUT
          else
            echo "DEBUG_APK_EXISTS=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload Debug Build Log
        if: always() && (${{ github.event.inputs.build_type == 'all' }} || ${{ github.event.inputs.build_type == '' }})
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: android/build-debug.log
          retention-days: 7
      
      - name: Upload Axxist-debug.apk
        if: steps.build_debug.outputs.DEBUG_APK_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Axxist-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      # ============================================================
      # Build Release APK
      # ============================================================
      - name: Build Release APK
        id: build_release
        if: ${{ github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'release' || github.event.inputs.build_type == '' }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build-release.log
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "RELEASE_APK_EXISTS=true" >> $GITHUB_OUTPUT
            echo "RELEASE_APK_SIZE=$(ls -lh app/build/outputs/apk/release/app-release.apk | awk '{print $5}')" >> $GITHUB_OUTPUT
            echo "RELEASE_SHA256=$(sha256sum app/build/outputs/apk/release/app-release.apk | awk '{print $1}')" >> $GITHUB_OUTPUT
            echo "RELEASE_APK_ABSOLUTE=$(realpath app/build/outputs/apk/release/app-release.apk)" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_APK_EXISTS=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload Release Build Log
        if: always() && (${{ github.event.inputs.build_type == 'all' }} || ${{ github.event.inputs.build_type == '' }})
        uses: actions/upload-artifact@v4
        with:
          name: build-release-log
          path: android/build-release.log
          retention-days: 7
      
      - name: Upload Axxist-release.apk
        if: steps.build_release.outputs.RELEASE_APK_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Axxist-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      
      # ============================================================
      # Android Lint
      # ============================================================
      - name: Run Android Lint
        id: lint
        if: ${{ github.event.inputs.build_type == 'all' || github.event.inputs.build_type == '' }}
        run: |
          cd android
          ./gradlew lintDebug --no-daemon 2>&1 | tee lint.log
          echo "LINT_COMPLETED=true" >> $GITHUB_OUTPUT
      
      - name: Upload Lint Report
        if: always() && (${{ github.event.inputs.build_type == 'all' }} || ${{ github.event.inputs.build_type == '' }})
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            android/lint.log
            android/app/build/reports/lint-results.html
            android/app/build/reports/lint-results.xml
          retention-days: 30

  # ============================================================
  # JOB 2: Generate APK Validation Report
  # ============================================================
  apk-validation-report:
    name: APK Validation Report
    runs-on: ubuntu-latest
    needs: [build-validation]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Generate APK Validation Report
        run: |
          cp .github/workflows/generate-report.py ./
          python3 generate-report.py
      
      - name: Upload APK Validation Report
        uses: actions/upload-artifact@v4
        with:
          name: apk-validation-report
          path: apk-validation-report.html
          retention-days: 30

  # ============================================================
  # JOB 3: Generate Build Summary
  # ============================================================
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-validation]
    
    steps:
      - name: Generate Build Summary
        run: |
          echo "=============================================" > build-summary.txt
          echo "AXXIST QUALITY GATE - BUILD SUMMARY" >> build-summary.txt
          echo "=============================================" >> build-summary.txt
          echo "" >> build-summary.txt
          echo "Repository: Vonwalter23/Axxist" >> build-summary.txt
          echo "Commit SHA: ${{ github.sha }}" >> build-summary.txt
          echo "Branch: ${{ github.ref_name }}" >> build-summary.txt
          echo "Date: $(date -u +\"%Y-%m-%d %H:%M:%S UTC\")" >> build-summary.txt
          echo "" >> build-summary.txt
          echo "APK VALIDATION" >> build-summary.txt
          echo "--------------" >> build-summary.txt
          echo "Debug APK: ${{ needs.build-validation.outputs.debug_apk_exists }}" >> build-summary.txt
          echo "Debug Size: ${{ needs.build-validation.outputs.debug_apk_size }}" >> build-summary.txt
          echo "Debug SHA256: ${{ needs.build-validation.outputs.debug_sha256 }}" >> build-summary.txt
          echo "Release APK: ${{ needs.build-validation.outputs.release_apk_exists }}" >> build-summary.txt
          echo "Release Size: ${{ needs.build-validation.outputs.release_apk_size }}" >> build-summary.txt
          echo "Release SHA256: ${{ needs.build-validation.outputs.release_sha256 }}" >> build-summary.txt
          echo "" >> build-summary.txt
          echo "=============================================" >> build-summary.txt
          echo "RESULT: ${{ needs.build-validation.result == 'success' && 'QUALITY GATE PASSED' || 'QUALITY GATE FAILED' }}" >> build-summary.txt
          echo "=============================================" >> build-summary.txt
      
      - name: Upload Build Summary
        uses: actions/upload-artifact@v4
        with:
          name: build-summary
          path: build-summary.txt
          retention-days: 30
      
      - name: Final Summary
        run: |
          echo "## Axxist Quality Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Validation | ${{ needs.build-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Debug APK | ${{ needs.build-validation.outputs.debug_apk_exists }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release APK | ${{ needs.build-validation.outputs.release_apk_exists }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated APKs:" >> $GITHUB_STEP_SUMMARY
          echo "- **Axxist-debug.apk** (${{ needs.build-validation.outputs.debug_apk_size }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Axxist-release.apk** (${{ needs.build-validation.outputs.release_apk_size }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "SHA256 Debug: \`${{ needs.build-validation.outputs.debug_sha256 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "SHA256 Release: \`${{ needs.build-validation.outputs.release_sha256 }}\`" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 4: Final Status
  # ============================================================
  final-status:
    name: Final Quality Gate Status
    runs-on: ubuntu-latest
    needs: [build-validation, build-summary]
    if: always()
    
    steps:
      - name: Determine Final Status
        run: |
          BUILD_STATUS=${{ needs.build-validation.result }}
          
          echo "Build Validation: $BUILD_STATUS"
          
          if [ "$BUILD_STATUS" == "success" ]; then
            echo "FINAL_STATUS=PASS" >> $GITHUB_OUTPUT
            echo "FINAL_STATUS=PASS" >> $GITHUB_ENV
            echo "RESULT=PASS"
            echo "✅ QUALITY GATE PASSED"
          else
            echo "FINAL_STATUS=FAIL" >> $GITHUB_OUTPUT
            echo "FINAL_STATUS=FAIL" >> $GITHUB_ENV
            echo "RESULT=FAIL"
            echo "❌ QUALITY GATE FAILED"
            exit 1
          fi
